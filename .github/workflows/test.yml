name: Run Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Run tests with coverage
        run: npm test -- --coverage
        env:
          CI: true
      
      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: |
            packages/*/coverage/
            coverage/
          if-no-files-found: ignore
          retention-days: 7
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            packages/*/test-results/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Run NPM build to check there are no build errors
        run: npm run build

      - name: Verify build output
        run: |
          test -f packages/axoview-app/build/_routes.json || (echo "::error::_routes.json missing from build output" && exit 1)
          test -f packages/axoview-app/build/_headers || (echo "::error::_headers missing from build output" && exit 1)

      # Strict type-check (lib + app tsc --noEmit via workspace lint scripts).
      # Added 2026-07-05: both the v1.1 perf-fixture drift and the app's four
      # latent type errors sat ungated because CI ran only eslint — see
      # technical-review-2026-07 §8c/§14b. Runs AFTER the build on purpose:
      # the app's tsc resolves `axoview` from the lib's dist declarations,
      # which only exist once build:lib has emitted them.
      - name: Type check
        run: npm run lint

      # Hard-fail since 2026-06-10 (v1.1 close-out): soft-fail ran clean across
      # the v1.1 wave, so per T2 G10 (git-automation-hardening.md) the gate is
      # now enforcing. A dead-code re-introduction fails CI.
      - name: Knip — dead-code report
        run: npx knip --reporter compact

      - name: Build Worker bundle and check size (ADR 0009 D8)
        run: |
          npx wrangler pages functions build --outdir .worker-build
          SIZE=$(du -sb .worker-build | cut -f1)
          LIMIT=1048576
          echo "Worker bundle size: ${SIZE} bytes (limit ${LIMIT} bytes / 1 MB uncompressed)"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::Worker bundle ${SIZE} bytes exceeds 1 MB uncompressed budget (ADR 0009 Decision 8)"
            exit 1
          fi
