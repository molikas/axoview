name: Run Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  # On-demand run against any branch — `integration` deliberately gets no
  # automatic CI (it is a live-deploy target that is pushed to mid-thought,
  # not a shared trunk), so this is how you ask for unit/tsc/knip there:
  #   gh workflow run "Run Tests" --ref integration
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN: this workflow only checks out and tests / lints /
# builds — it never writes to the repo or calls the API.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      # Guards the ADR governance metadata (Status / supersession fields /
      # currency claims) — the fields the 2026-07-15 conformance audit found
      # ALL of its real defects in, because unlike decision text they have no
      # feedback loop. No deps beyond node; runs in ~1s.
      - name: Lint docs governance
        run: npm run lint:docs

      - name: Run tests with coverage
        run: npm test -- --coverage
        env:
          CI: true
      
      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: |
            packages/*/coverage/
            coverage/
          if-no-files-found: ignore
          retention-days: 7
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            packages/*/test-results/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Run NPM build to check there are no build errors
        run: npm run build

      - name: Verify build output
        run: |
          test -f packages/axoview-app/build/_routes.json || (echo "::error::_routes.json missing from build output" && exit 1)
          test -f packages/axoview-app/build/_headers || (echo "::error::_headers missing from build output" && exit 1)
          # Advanced-mode Pages worker (ADR 0046 §2 / D1): the build's postbuild step
          # bundles the Hono app + AGENT_SESSION Durable Object into _worker.js. Its
          # absence means the Drive proxy AND the MCP bridge won't deploy.
          test -f packages/axoview-app/build/_worker.js || (echo "::error::_worker.js missing from build output (postbuild build-worker.mjs failed)" && exit 1)

      # Strict type-check (lib + app tsc --noEmit via workspace lint scripts).
      # Added 2026-07-05: both the v1.1 perf-fixture drift and the app's four
      # latent type errors sat ungated because CI ran only eslint — see
      # technical-review-2026-07 §8c/§14b. Runs AFTER the build on purpose:
      # the app's tsc resolves `axoview` from the lib's dist declarations,
      # which only exist once build:lib has emitted them.
      - name: Type check
        run: npm run lint

      # Hard-fail since 2026-06-10 (v1.1 close-out): soft-fail ran clean across
      # the v1.1 wave, so per T2 G10 (git-automation-hardening.md) the gate is
      # now enforcing. A dead-code re-introduction fails CI.
      - name: Knip — dead-code report
        run: npx knip --reporter compact

      - name: Check Worker bundle size (ADR 0009 D8)
        # Advanced-mode Pages worker (D1 resolution 2026-07-21): the app build's
        # postbuild already produced build/_worker.js (Hono app + MCP + AGENT_SESSION
        # DO). Measure it directly — file-based `wrangler pages functions build` is
        # retired because it strips the DO class (DOs need advanced mode).
        run: |
          SIZE=$(du -sb packages/axoview-app/build/_worker.js | cut -f1)
          LIMIT=1048576
          echo "Worker bundle size: ${SIZE} bytes (limit ${LIMIT} bytes / 1 MB uncompressed)"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::Worker bundle ${SIZE} bytes exceeds 1 MB uncompressed budget (ADR 0009 Decision 8)"
            exit 1
          fi

  # Single stable check name for the whole matrix, so the master ruleset can
  # require ONE context instead of naming every leg. Requiring `test (22.x)` /
  # `test (24.x)` directly would silently un-gate the day the matrix changes:
  # a required context that no longer reports blocks forever, and one that was
  # dropped stops being checked at all.
  ci-gate:
    name: CI Gate
    # `always()` is load-bearing. Without it this job is SKIPPED when `test`
    # fails, and GitHub counts a skipped check as PASSING for required status
    # checks — the gate would green-light precisely the runs it exists to stop.
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Assert the test matrix passed
        run: |
          echo "test matrix result: ${{ needs.test.result }}"
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::CI Gate: test matrix did not pass (result=${{ needs.test.result }})"
            exit 1
          fi
