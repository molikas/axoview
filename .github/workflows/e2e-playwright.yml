# E2E (Playwright) — replaces the legacy Python/Selenium `e2e-tests.yml`
# (deleted in this same commit). Shape A: Playwright spawns the dev server
# itself via the `webServer` block in
# packages/axoview-e2e/playwright.config.ts — no separate `serve` step needed.
#
# Locked decision #4 + audit C.2 row I9. The T1-rewrite tactical that first
# scoped this suite is retired; the live reference is docs/testing.md
# ("CI execution model — sharding"), which also records the two invariants
# that keep sharding safe (keep fullyParallel:false; don't serve a prod bundle).
#
# Speed: the suite (72 spec files / ~157 tests) runs at workers=1 because the
# shared rsbuild dev server can't take parallel HMR clients. To parallelise
# without that risk we SHARD across runners — each shard is a full, independent
# runner that runs its slice at workers=1, so within a runner the execution is
# byte-for-byte the proven sequential flow. N shards ≈ N× wall-clock reduction
# (trade: N× runner-minutes). Blob reports from each shard are merged into one
# HTML report on failure. Keep SHARD_TOTAL and the matrix list in sync.

name: E2E (Playwright)

on:
  pull_request:
    # master only: PRs into `integration` used to run this 6m30s suite while
    # skipping the 2m20s unit suite (Run Tests is master-only) — exactly
    # inverted. E2E is wanted on demand or at the promotion gate, not on the
    # integration loop; `workflow_dispatch` below covers the on-demand half.
    branches: ["master"]
    # `ready_for_review` is NOT in the default type set (opened/synchronize/
    # reopened). Without it the draft filter on `playwright` below becomes a
    # hole once E2E Gate is a required check: draft → job skipped → mark ready
    # → nothing re-triggers → the check stays `skipped`, and GitHub counts
    # skipped as PASSING. The suite would never run and the merge would pass.
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: e2e-playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: checkout + run the Playwright suite only.
permissions:
  contents: read

env:
  SHARD_TOTAL: 4

jobs:
  playwright:
    name: Playwright (chromium) [shard ${{ matrix.shard }}/4]
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      # One shard failing must not cancel the others — we want the full picture.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # axoview-app reads axoview-lib from dist/, not source — must build
      # the lib before Playwright spawns the dev server (memory:
      # project_dev_lib_rebuild).
      - name: Build axoview-lib
        run: npm run build:lib

      # Cache the Playwright browser binaries keyed on the installed Playwright
      # version, so only the very first run per version pays the download.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      # `--with-deps` still apt-installs the OS libs on a cache hit (cheap); the
      # browser binary itself is skipped when already cached.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Config's `webServer` block handles `npm run dev` lifecycle; no
      # explicit serve / wait-on needed. `--shard=i/N` runs this runner's slice.
      - name: Run Playwright suite (shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }})
        run: npm run test:e2e:ci -- --shard=${{ matrix.shard }}/${{ env.SHARD_TOTAL }}
        env:
          CI: true

      # Every shard uploads its blob so the merge job (which fires only on a
      # failure, in a different shard or this one) can assemble the whole report.
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard }}
          path: packages/axoview-e2e/blob-report
          if-no-files-found: ignore
          retention-days: 3

  # Merge the per-shard blob reports into one HTML report — only when a shard
  # failed, so green runs stay at the wall-clock of the slowest shard.
  merge-reports:
    name: Merge Playwright reports
    if: ${{ failure() && github.event.pull_request.draft != true }}
    needs: [playwright]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v7
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into a single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

  # Single stable check name for all shards — this is what makes SHARD_TOTAL
  # safe to change. Requiring `Playwright (chromium) [shard n/4]` by name would
  # encode the shard count into the master ruleset, so re-sharding would either
  # block every PR (contexts that never report) or silently drop coverage.
  e2e-gate:
    name: E2E Gate
    # See the CI Gate note in test.yml: without `always()` a failed shard skips
    # this job, and a skipped check counts as a PASS for required checks.
    # Deliberately fail-closed on `skipped` too (draft PRs): "the suite did not
    # run" is not "the suite passed". Drafts can't be merged, and marking one
    # ready re-triggers the workflow via the `ready_for_review` type above.
    if: always()
    needs: [playwright]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Assert every shard passed
        run: |
          echo "playwright shards result: ${{ needs.playwright.result }}"
          if [ "${{ needs.playwright.result }}" != "success" ]; then
            echo "::error::E2E Gate: shards did not pass (result=${{ needs.playwright.result }})"
            exit 1
          fi
