# E2E (Playwright) — replaces the legacy Python/Selenium `e2e-tests.yml`
# (deleted in this same commit). Shape A: Playwright spawns the dev server
# itself via the `webServer` block in
# packages/axoview-e2e/playwright.config.ts — no separate `serve` step needed.
#
# Locked decision #4 + audit C.2 row I9 + tactical
# docs/tactical/e2e-suite-rewrite.md Session 7.

name: E2E (Playwright)

on:
  pull_request:
    branches: ["master", "integration"]
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: e2e-playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: checkout + run the Playwright suite only.
permissions:
  contents: read

jobs:
  playwright:
    name: Playwright (chromium)
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # axoview-app reads axoview-lib from dist/, not source — must build
      # the lib before Playwright spawns the dev server (memory:
      # project_dev_lib_rebuild).
      - name: Build axoview-lib
        run: npm run build:lib

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Config's `webServer` block handles `npm run dev` lifecycle; no
      # explicit serve / wait-on needed.
      - name: Run Playwright suite
        run: npm run test:e2e:ci
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            packages/axoview-e2e/playwright-report
            packages/axoview-e2e/test-results
          if-no-files-found: ignore
          retention-days: 7
