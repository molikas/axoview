name: Release

on:
  # Runs after the unit-test workflow completes successfully on push to master.
  # (Cloudflare Pages deploy is handled by CF's native git integration, not GH Actions —
  # see Locked Decision #14 in docs/tactical/productization-audit.md.)
  workflow_run:
    workflows: ["Run Tests"]
    types:
      - completed
    branches: ["main", "master"]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
