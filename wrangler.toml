# Cloudflare Pages config (consumed by the "Deploy to Cloudflare" button and
# by `wrangler pages deploy` from the repo root). Pages Functions live under
# /functions and are scoped to /api/* via _routes.json (see
# packages/axoview-app/public/_routes.json after build).

name = "axoview"
compatibility_date = "2025-01-01"
pages_build_output_dir = "packages/axoview-app/build"

# Storage-less deployment: no R2 binding. The Worker reports
# serverStorage=false via /api/config and the frontend falls back to
# session/localStorage. Persistent storage on Cloudflare is tracked on
# a separate branch (Google Drive integration).

[vars]
AUTH_MODE = "shared-token"

# GOOGLE_CLIENT_ID is a PUBLIC OAuth identifier, NOT a secret. It is sent from the
# browser to Google on every sign-in and is guarded by the Authorized JavaScript
# origins allowlist (Google Cloud console), not by secrecy — so it is safe to
# commit. Surfaced by /api/config to the frontend. One value serves both the
# production deploy (axoview.app + axoview.pages.dev) and the integration preview
# (integration.axoview.pages.dev); an empty/absent value makes the frontend hide
# all Google Drive UI.
GOOGLE_CLIENT_ID = "485371025824-2ullp84i3nda2dgceirg9q87fvm36kl8.apps.googleusercontent.com"

# Real secrets — configure via dashboard or `wrangler pages secret put`, never commit:
#   AUTH_SHARED_SECRET     (when AUTH_MODE=shared-token)
#   CF_ACCESS_TEAM_DOMAIN  (when AUTH_MODE=cf-access; e.g. "myteam")
#   CF_ACCESS_AUD          (when AUTH_MODE=cf-access; the application AUD tag)

# --- Remote-MCP session bridge (ADR 0046) ---
# Per-session Durable Object holding the routing state + the hibernatable WebSocket
# to the user's tab. Keep in lockstep with packages/axoview-worker/wrangler.toml
# (ADR 0009 §5 drift rule).
[[durable_objects.bindings]]
name = "AGENT_SESSION"
class_name = "AgentSessionDO"

# FREE-TIER HARD REQUIREMENT (ADR 0046 §2): new_sqlite_classes, NOT new_classes.
# Only SQLite-backed DOs are on the Workers Free plan; the DO uses state.storage.sql
# + the WebSocket Hibernation API. The wrong migration class silently demands a paid
# plan.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentSessionDO"]
