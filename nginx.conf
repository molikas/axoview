server {
    listen 80;
    server_name localhost;

    # Allow larger request bodies (up to 10MB)
    client_max_body_size 10M;

    # Security headers — parity with packages/axoview-app/public/_headers
    # HSTS intentionally omitted to match _headers (host-driven, not app-driven).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; connect-src 'self' https://www.googleapis.com https://content.googleapis.com https://oauth2.googleapis.com https://*.cloudflareaccess.com https://*.workers.dev wss://*.workers.dev http://127.0.0.1:8787 ws://127.0.0.1:8787; img-src 'self' data: blob: https://*.googleusercontent.com https://ssl.gstatic.com; style-src 'self' 'unsafe-inline'; frame-src https://accounts.google.com https://docs.google.com https://drive.google.com; object-src 'none'; base-uri 'self'" always;

    root /usr/share/nginx/html;

    # Serve the shared 404 page with a REAL 404 status (parity with Cloudflare
    # `public/_redirects` `/*  /404.html  404`). Without this, `try_files … /404.html`
    # would emit the error body with HTTP 200 — a soft-404 the two deploy targets
    # would disagree on (crawlers may index a 200 error page).
    error_page 404 /404.html;

    # R1 (ADR 0040): marketing landing at /, editor SPA under /app.

    # Legacy share links minted before R1: /display/… → /app/display/…
    location /display/ {
        return 301 /app$request_uri;
    }

    # Editor SPA shell for /app and any client-side route beneath it.
    location = /app {
        try_files /app.html =404;
    }
    location /app/ {
        try_files $uri /app.html;
    }

    # Root = the static marketing landing.
    location = / {
        try_files /index.html =404;
    }

    # Everything else: serve the file (assets, /privacy → /privacy.html via the
    # clean-URL attempt), otherwise a genuine 404 (via error_page above) — never
    # the SPA or the landing.
    location / {
        try_files $uri $uri.html =404;
    }

    # Proxy API requests to Node.js backend
    location /api/ {
        # /api/* must not be cached (parity with _headers)
        add_header Cache-Control "no-store" always;
        # Re-emit security headers — `add_header` does not inherit when a
        # location block sets its own headers.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; connect-src 'self' https://www.googleapis.com https://content.googleapis.com https://oauth2.googleapis.com https://*.cloudflareaccess.com https://*.workers.dev wss://*.workers.dev http://127.0.0.1:8787 ws://127.0.0.1:8787; img-src 'self' data: blob: https://*.googleusercontent.com https://ssl.gstatic.com; style-src 'self' 'unsafe-inline'; frame-src https://accounts.google.com https://docs.google.com https://drive.google.com; object-src 'none'; base-uri 'self'" always;

        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow larger bodies for API requests
        client_max_body_size 10M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
