<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="<%= assetPrefix %>favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta
      name="description"
      content="Create beautiful isometric diagrams with FossFLOW - A powerful open-source diagramming tool for creating stunning isometric illustrations"
    />
    <link rel="apple-touch-icon" href="<%= assetPrefix %>logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="<%= assetPrefix %>manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "<%= assetPrefix %>favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>FossFLOW - Isometric Diagramming Tool</title>
    <style>
      /* Splash screen — visible from first paint until React commits the editor
         shell, then faded by App.tsx on `editor:first-paint-after-mount`. */
      #ff-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        transition: opacity 200ms ease;
      }
      #ff-splash.ff-splash-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .ff-splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }
      .ff-splash-logo {
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #1f2937;
      }
      .ff-splash-logo .ff-splash-logo-accent {
        color: #2563eb;
      }
      .ff-splash-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e5e7eb;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: ff-splash-spin 800ms linear infinite;
      }
      @keyframes ff-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="ff-splash">
      <div class="ff-splash-inner">
        <div class="ff-splash-logo">Foss<span class="ff-splash-logo-accent">FLOW</span></div>
        <div class="ff-splash-spinner" role="progressbar" aria-label="Loading FossFLOW"></div>
      </div>
    </div>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
