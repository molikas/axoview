# Standalone wrangler config for the Worker package itself (used by
# `wrangler pages dev` from this directory). The repo-root wrangler.toml is
# what the "Deploy to Cloudflare" button consumes for Pages.
#
# Retained for local dev (`npx wrangler dev --config packages/axoview-worker/wrangler.toml`).
# Keep [vars] and compatibility_date in lockstep with the repo-root wrangler.toml —
# drift between the two is a known operational risk per ADR 0009 Decision 5.

name = "axoview"
compatibility_date = "2025-01-01"
pages_build_output_dir = "../axoview-app/build"

# Storage-less deployment: no R2 binding. See repo-root wrangler.toml.

[vars]
AUTH_MODE = "shared-token"

# GOOGLE_CLIENT_ID is a PUBLIC OAuth identifier, NOT a secret — safe to commit.
# Serves /api/config under local `wrangler pages dev`. Kept in lockstep with the
# repo-root wrangler.toml per ADR 0009 Decision 5 (drift between the two files is
# a known operational risk).
GOOGLE_CLIENT_ID = "485371025824-2ullp84i3nda2dgceirg9q87fvm36kl8.apps.googleusercontent.com"

# Real secrets — configure via `wrangler secret put`, never commit:
#   AUTH_SHARED_SECRET, CF_ACCESS_TEAM_DOMAIN, CF_ACCESS_AUD

# --- Remote-MCP session bridge (ADR 0046) ---
# Pages binds to the DO defined in the standalone axoview-mcp Worker (Pages cannot
# host a DO itself). The DO + its migration live in wrangler.mcp.toml. Kept in
# lockstep with the repo-root wrangler.toml per ADR 0009 §5.
[[durable_objects.bindings]]
name = "AGENT_SESSION"
class_name = "AgentSessionDO"
script_name = "axoview-mcp"
