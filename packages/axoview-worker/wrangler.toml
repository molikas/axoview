# Standalone wrangler config for the Worker package itself (used by
# `wrangler pages dev` from this directory). The repo-root wrangler.toml is
# what the "Deploy to Cloudflare" button consumes for Pages.
#
# Retained for local dev (`npx wrangler dev --config packages/axoview-worker/wrangler.toml`).
# Keep [vars] and compatibility_date in lockstep with the repo-root wrangler.toml —
# drift between the two is a known operational risk per ADR 0009 Decision 5.

name = "axoview"
compatibility_date = "2025-01-01"
pages_build_output_dir = "../axoview-app/build"

# Storage-less deployment: no R2 binding. See repo-root wrangler.toml.

[vars]
AUTH_MODE = "shared-token"
# AUTH_SHARED_SECRET, CF_ACCESS_*, GOOGLE_CLIENT_ID are configured as secrets
# via `wrangler secret put` — never commit them.
